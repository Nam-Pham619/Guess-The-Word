<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knockoff Word</title>
<link rel="icon" type="image/png" href="./word-thing.png">
<style>
html, body {
  height: 100%;
  overflow-x: hidden;
}
body {
  font-family: inherit, serif;
  margin: 0;
  padding: 0;
  line-height: 1.5;
  overflow-x: hidden;
  background-size: cover;
  background-repeat: no-repeat;
  min-height: 100dvh;
  background-color: #e5e5da;
}
section {
  padding: clamp(1rem, 4vw, 2rem);
  text-align: center;
}
h1 {
  font-size: clamp(1.8rem, 5vw, 3rem);
  text-align: center;
}
a {
  color: #007BFF;
  text-decoration: none;
}
button {
  display: block;
  margin: 0 auto;
  padding: 0.5rem 1rem;
  text-align: center;
  border-radius: 20px;
  border: 3px solid #ccc;
  font-size: clamp(1rem, 3vw, 1.2rem);
}
input {
  text-transform: uppercase;
  width: clamp(3rem, 12vw, 5rem);
  height: clamp(3rem, 12vw, 5rem);
  text-align: center;
  font-size: 2rem;
  transition: background-color 0.3s ease;
  background-color: #ccccbb;
  border: none;
}
dialog {
  position: relative;
  padding: 2rem;
  border-radius: 8px;
  border: 1px solid #ccc;
}
#status {
  font-size: clamp(1rem, 3vw, 1.5rem);
  color: darkgreen;
  margin-top: 1rem;
}
#board {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.close-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: none;
  border: none;
  font-size: 1.5rem;
  cursor: pointer;
}
.row1 {
  margin-top: 0.5rem;
}
.corner-link {
  position: fixed;
  bottom: 1vw;
  right: 1vw;
  background: #fff;
  padding: 0.3rem 0.6rem;
  border-radius: 5px;
  font-size: 1.5vw;
}
.corner-link-2 {
  position: fixed;
  bottom: 1vw;
  right: 8vw;
  background: #fff;
  padding: 0.3rem 0.6rem;
  border-radius: 5px;
  font-size: 1.5vw;
}
.pulse {
  animation: pulse 0.2s ease;
}
.row {
  margin-bottom: 0.2rem;
  gap: 0.3rem;
  display: flex;
}
@keyframes pulse {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* ── Language mode buttons ── */
#lang-buttons {
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin: 0.5rem 0 1rem;
}
.lang-btn {
  display: inline-block;
  padding: 0.35rem 0.9rem;
  border-radius: 20px;
  border: 3px solid #ccc;
  font-size: clamp(0.85rem, 2.5vw, 1rem);
  cursor: pointer;
  background: #fff;
  transition: background 0.2s, border-color 0.2s;
}
.lang-btn.active {
  background: #57af54;
  border-color: #3d8c3a;
  color: #fff;
}
.lang-btn:hover:not(.active) {
  background: #e0e0d5;
}

/* End-of-game overlay dialog */
#endDialog {
  position: relative;
  padding: 2rem 2.5rem;
  border-radius: 10px;
  border: 1px solid #ccc;
  text-align: center;
  min-width: 220px;
}
#endDialog .end-title {
  font-size: 1.6rem;
  font-weight: bold;
  margin-bottom: 0.4rem;
}
#endDialog .end-answer {
  font-size: 1.1rem;
  margin-bottom: 1rem;
  color: #444;
}
#endDialog #endNewWord {
  margin: 0 auto;
}

@media (max-width: 600px) {
  #keyboard button {
    font-size: 0.7rem;
    padding: 0.3rem 0.45rem;
  }
  h2 { font-size: 2rem; }
  .row1 { font-size: 0.2vw; }
  .row2 { font-size: 0.2vw; }
  .row3 { font-size: 0.2vw; }
  .corner-link-2 { right: 12vw; }
  input {
    width: 2.5rem;
    height: 2.5rem;
    font-size: 1.4rem;
  }
  .corner-link, .corner-link-2 { font-size: 2.5vw; }
}
</style>
</head>

<section id="project">
  <h1 style="margin-bottom:0.1rem;">Guess the Word</h1>
  <h2 style="margin-top:0.2rem;">Infinite</h2>

    </div>
  </div>

      <button id="w"  style="display:inline-block">W</button>
      <button id="e"  style="display:inline-block">E</button>
      <button id="r"  style="display:inline-block">R</button>
      <button id="t"  style="display:inline-block">T</button>
      <button id="y"  style="display:inline-block">Y</button>
      <button id="u"  style="display:inline-block">U</button>

      <button id="o"  style="display:inline-block">O</button>

    </div>
    <div class="row2">

      <button id="s"  style="display:inline-block">S</button>

      <button id="f"  style="display:inline-block">F</button>
      <button id="g"  style="display:inline-block">G</button>
      <button id="h"  style="display:inline-block">H</button>
      <button id="j"  style="display:inline-block">J</button>
      <button id="k"  style="display:inline-block">K</button>
      <button id="l"  style="display:inline-block">L</button>
    </div>
    <div class="row3">
      <button id="enter"     style="display:inline-block">Enter</button>
      <button id="z"         style="display:inline-block">Z</button>
      <button id="x"         style="display:inline-block">X</button>
      <button id="c"         style="display:inline-block">C</button>
      <button id="v"         style="display:inline-block">V</button>
      <button id="b"         style="display:inline-block">B</button>
      <button id="n"         style="display:inline-block">N</button>
      <button id="m"         style="display:inline-block">M</button>
      <button id="backspace" style="display:inline-block">Backspace</button>
    </div>
  </div>

  <p id="status"></p>

  <button class="corner-link"   onclick="location.href='index.html';pulse(this)">Daily</button>
  <button class="corner-link-2" onclick="reset(); pulse(this)">New Word</button>

  <!-- End-of-game dialog (win OR lose) -->
  <dialog id="endDialog">
    <button class="close-btn" aria-label="close">&times;</button>
    <p class="end-title"  id="endTitle"></p>
    <p class="end-answer" id="endAnswerText"></p>
    <button id="endNewWord" onclick="reset(); endDialog.close()">New Word</button>
  </dialog>
</section>

const SPANISH_VALID = new Set(SPANISH_ANSWERS);
const FRENCH_VALID  = new Set(FRENCH_ANSWERS);

/* ═══════════════════════════════════════════════

═══════════════════════════════════════════════ */
let word      = "";
let dis       = false;
let words     = [];     // valid-guess list
let guessNum  = 0;
let wins      = false;
let currentLang = "english";

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */
function pulse(element) {
  element.classList.remove("pulse");
  void element.offsetWidth;
  element.classList.add("pulse");
}

/* ═══════════════════════════════════════════════
   WORD LOADING
═══════════════════════════════════════════════ */
async function loadEnglishValid() {
  const response = await fetch("./valid-words.txt");
  const text     = await response.text();
  words = text.split("\n").map(w => w.trim().toLowerCase()).filter(Boolean);
}

async function loadEnglishAnswer() {
  const response = await fetch("./word-answers.txt");
  const data     = await response.text();
  const lines    = data.trim().toLowerCase().split("\n").map(w => w.trim()).filter(Boolean);
  word = lines[Math.floor(Math.random() * lines.length)];
}

function loadLangWord(lang) {
  if (lang === "spanish") {
    words = SPANISH_ANSWERS.concat(Array.from(SPANISH_VALID));
    word  = SPANISH_ANSWERS[Math.floor(Math.random() * SPANISH_ANSWERS.length)];
  } else if (lang === "french") {
    words = FRENCH_ANSWERS.concat(Array.from(FRENCH_VALID));
    word  = FRENCH_ANSWERS[Math.floor(Math.random() * FRENCH_ANSWERS.length)];
  }
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
async function init() {
  await loadEnglishValid();
  await loadEnglishAnswer();
  getActiveInput().focus();
}
init();

/* ═══════════════════════════════════════════════
   RESET  (called by New Word button + language switch)
═══════════════════════════════════════════════ */
async function reset() {
  // Load new word for current language
  if (currentLang === "english") {
    await loadEnglishAnswer();
  } else {
    loadLangWord(currentLang);
  }

  guessNum = 0;
  wins     = false;
  dis      = false;

  // Clear status
  const statusEl = document.getElementById("status");
  statusEl.textContent = "";

  // Rebuild board with one fresh row
  const boardEl = document.getElementById("board");
  boardEl.innerHTML = "";
  const nRow = document.createElement("div");
  nRow.className = "row";
  for (let i = 0; i < 5; i++) {
    const input = document.createElement("input");
    input.maxLength  = 1;
    input.inputMode  = "none";
    setUpInput(input);
    nRow.appendChild(input);
  }
  boardEl.appendChild(nRow);
  nRow.querySelector("input").focus();

  // Reset keyboard colours
  document.querySelectorAll("#keyboard button").forEach(btn => {
    btn.style.backgroundColor = "";
    btn.style.color = "black";
  });
}

document.getElementById("lang-buttons").addEventListener("click", async (e) => {
  const btn = e.target.closest(".lang-btn");
  if (!btn) return;

  const lang = btn.dataset.lang;
  if (lang === currentLang) return;

  currentLang = lang;

  // Update active styling
  document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  // Pre-load valid words for English if switching back
  if (lang === "english") {
    await loadEnglishValid();
  } else {
    loadLangWord(lang); // sets words & word
  }

  // Full reset (will reload word for currentLang)
  await reset();
});

/* ═══════════════════════════════════════════════
   END DIALOG
═══════════════════════════════════════════════ */
const endDialog   = document.getElementById("endDialog");
const endTitle    = document.getElementById("endTitle");
const endAnswerTxt= document.getElementById("endAnswerText");

endDialog.querySelector(".close-btn").addEventListener("click", () => endDialog.close());

function showEndDialog(won) {
  if (won) {
    endTitle.textContent         = "🎉 You won!";
    endTitle.style.color         = "green";
    endAnswerTxt.textContent     = `The word was: ${word.toUpperCase()}`;
  } else {
    endTitle.textContent         = "😞 Game Over";
    endTitle.style.color         = "crimson";
    endAnswerTxt.textContent     = `The answer was: ${word.toUpperCase()}`;
  }
  endDialog.showModal();
}

/* ═══════════════════════════════════════════════
   KEYBOARD REFS
═══════════════════════════════════════════════ */
const keyButtons = {};
"abcdefghijklmnopqrstuvwxyz".split("").forEach(letter => {
  keyButtons[letter] = document.getElementById(letter);
});

/* ═══════════════════════════════════════════════
   INPUT HELPERS
═══════════════════════════════════════════════ */
function getActiveInput() {
  const cuRow = document.getElementById("board").lastElementChild;
  const inputs = cuRow.querySelectorAll("input");
  return Array.from(inputs).find(input => input.value === "");
}

function setUpInput(input) {
  input.addEventListener("input", () => {
    input.value = input.value.replace(/[^a-zA-Z]/g, "").toLowerCase();
    if (input.value.length === 1) {
      const next = input.nextElementSibling;
      if (next) next.focus();
    }
  });
  input.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && input.value === "") {
      const previous = input.previousElementSibling;
      if (previous) previous.focus();
    }
  });
}

document.querySelectorAll("input").forEach(setUpInput);

/* ═══════════════════════════════════════════════
   ON-SCREEN KEYBOARD HANDLER
═══════════════════════════════════════════════ */
document.getElementById("keyboard").addEventListener("click", (e) => {
  if (e.target.tagName !== "BUTTON") return;
  const key = e.target.id;

  if (keyButtons[key]) pulse(keyButtons[key]);

  const activeInput = getActiveInput();

  if (!activeInput && key !== "enter" && key !== "backspace") return;
  if (!activeInput || !activeInput.readOnly) {
    if (key === "enter" && !dis) {
      guesser();
    } else if (key === "backspace" && !wins && !dis) {
      const cuRow  = document.getElementById("board").lastElementChild;
      const inputs = Array.from(cuRow.querySelectorAll("input"));
      const lastFilled = inputs.reverse().find(inp => inp.value !== "");
      if (lastFilled) { lastFilled.value = ""; lastFilled.focus(); }
    } else if (key.length === 1 && activeInput) {
      activeInput.value = key;
      activeInput.dispatchEvent(new Event("input"));
    }
  }
});

/* ═══════════════════════════════════════════════
   PHYSICAL KEYBOARD
═══════════════════════════════════════════════ */
document.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !dis) guesser();
});

/* ═══════════════════════════════════════════════
   GUESSER
═══════════════════════════════════════════════ */
async function guesser() {
  dis = true;
  const used   = [false, false, false, false, false];
  const boardEl= document.getElementById("board");
  const statusEl= document.getElementById("status");
  const rows   = boardEl.querySelectorAll(".row");
  const cuRow  = rows[guessNum];
  const res    = cuRow.querySelectorAll("input");

  let guess = "";
  res.forEach(input => { guess += input.value.toLowerCase(); });

  if (guess.length !== 5) {
    statusEl.textContent  = "Enter 5 letters";
    statusEl.style.color  = "red";
    dis = false;
    setTimeout(() => { statusEl.textContent = ""; }, 2000);
    return;
  }

  // Validate: for english check words[], for others check both answers + words[]
  const isValid = words.includes(guess);
  if (!isValid) {
    statusEl.textContent  = "Enter a real word";
    statusEl.style.color  = "red";
    dis = false;
    setTimeout(() => { statusEl.textContent = ""; }, 2000);
    return;
  }

  // Mark correct positions
  let temp = word.split("");
  for (let i = 0; i < res.length; i++) {
    res[i].readOnly = true;
    if (guess[i] === temp[i]) used[i] = true;
  }

  // Colour tiles with animation
  for (let i = 0; i < res.length; i++) {
    const input = res[i];
    const index = temp.indexOf(guess[i]);

    if (guess[i] === temp[i]) {
      input.style.backgroundColor              = "#57af54";
      keyButtons[guess[i]].style.backgroundColor = "#57af54";
      keyButtons[guess[i]].style.color           = "white";
    } else if (index !== -1 && !used[index]) {
      input.style.backgroundColor              = "#cccc4f";
      keyButtons[guess[i]].style.backgroundColor = keyButtons[guess[i]].style.backgroundColor === "#57af54" ? "#57af54" : "#cccc4f";
      keyButtons[guess[i]].style.color           = "white";
      temp[index] = null;
      used[index] = true;
    } else {
      input.style.backgroundColor              = "#7e8281";
      if (keyButtons[guess[i]].style.backgroundColor !== "#57af54" &&
          keyButtons[guess[i]].style.backgroundColor !== "#cccc4f") {
        keyButtons[guess[i]].style.backgroundColor = "#7e8281";
        keyButtons[guess[i]].style.color           = "white";
      }
    }

    input.style.color = "white";
    input.readOnly    = true;

    input.classList.add("pulse");
    setTimeout(() => input.classList.remove("pulse"), 200);
    keyButtons[guess[i]].classList.add("pulse");
    setTimeout(() => keyButtons[guess[i]].classList.remove("pulse"), 200);

    await new Promise(resolve => setTimeout(resolve, 250));
  }

  // WIN
  if (guess === word) {
    wins = true;
    statusEl.style.color = "green";
    statusEl.textContent = "You won!";
    showEndDialog(true);
    dis = false;
    return;
  }

  guessNum += 1;

  // LOSE (used all 6 rows: indices 0-5)
  if (guessNum >= 6) {
    document.querySelectorAll("input").forEach(inp => { inp.readOnly = true; });
    statusEl.textContent = `The answer was: ${word.toUpperCase()}`;
    statusEl.style.color = "red";
    showEndDialog(false);
    dis = false;
    return;
  }

  // Add new row
  const nRow = document.createElement("div");
  nRow.className = "row";
  for (let i = 0; i < 5; i++) {
    const input     = document.createElement("input");
    input.maxLength = 1;
    input.inputMode = "none";
    input.addEventListener("input", function() {
      this.value = this.value.replace(/[^a-zA-Z]/g, "");
    });
    setUpInput(input);
    nRow.appendChild(input);
  }
  boardEl.appendChild(nRow);
  nRow.querySelector("input").focus();
  dis = false;
}
</script>
